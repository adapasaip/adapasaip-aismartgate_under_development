<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1e40af" stroke="#0f172a" stroke-width="2"/>
  
  <!-- Video camera icon -->
  <g transform="translate(50, 50)">
    <!-- Camera body -->
    <rect x="-28" y="-14" width="40" height="28" rx="3" fill="#60a5fa" stroke="#0f172a" stroke-width="1.5"/>
    
    <!-- Camera lens -->
    <circle cx="-8" cy="0" r="9" fill="#dbeafe" stroke="#0f172a" stroke-width="1.5"/>
    <circle cx="-8" cy="0" r="6" fill="#1e40af" opacity="0.3"/>
    
    <!-- Play button (red recording indicator) -->
    <circle cx="12" cy="-8" r="4.5" fill="#ef4444" stroke="#0f172a" stroke-width="1"/>
  </g>
  
  <!-- Decorative corner accent -->
  <circle cx="85" cy="15" r="3" fill="#60a5fa" opacity="0.6"/>
</svg>
